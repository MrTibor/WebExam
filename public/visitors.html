<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Visitor Page</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="visitors.html">Visitors</a>
        </nav>
    </header>

    <main>
        <h2>Website Statistics</h2>

        <div class="visitor-box">
            <p><strong>Total visitors:</strong> <span id="totalVisitors">Loading...</span></p>
            <p><strong>Website started:</strong> <span id="startDate">Loading...</span></p>
            <p><strong>Website lifetime in days:</strong> <span id="lifetimeDays">Loading...</span></p>
        </div>
    </main>

    <footer>
        <p>*Server is from OMDb</p>
    </footer>

    <script>
        async function loadVisitorData() {
     try {
                const response = await fetch('/api/visitors');
                const data = await response.json();

                document.getElementById('totalVisitors').textContent = data.totalVisitors;
                document.getElementById('startDate').textContent = data.startDate;
                document.getElementById('lifetimeDays').textContent = data.lifetimeDays;
            } catch (error) {
                document.getElementById('totalVisitors').textContent = 'Error';
                document.getElementById('startDate').textContent = 'Error';
                document.getElementById('lifetimeDays').textContent = 'Error';
     }
        }

        loadVisitorData();
    </script>
</body>
</html>
