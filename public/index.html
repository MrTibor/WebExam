<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Movie Explorer</h1>
    <p class="tagline">Your gateway to movie discovery</p>

    <nav>
        <a href="index.html">Home</a>
        <a href="top-movies.html">Top Movies 2025</a>
        <a href="top-series.html">Top Series 2025</a>
        <a href="visitors.html">Visitors</a>
    </nav>
</header>

<main>
<section class="hero-section">

    <h2>
        <span class="discover-text">Discover</span>
        <span class="movies-text">Movies</span> &
        <span class="series-text">Series</span>
    </h2>

    <p>Search your favorite titles, explore popular releases, and view detailed movie information in one place.</p>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search for movies or series...">
        <button id="searchButton">Search</button>

        <div id="suggestions" class="suggestions-box"></div>
    </div>

</section>

<div id="results"></div>

</main>

<footer>
    <p>*Movie data is provided by OMDb API</p>
</footer>

<script src="script.js"></script>

</body>
</html>
